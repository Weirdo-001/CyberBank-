{% extends "base.html" %}
{% block title %}Register — Citadel National Bank{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>📋 Open New Account</h2>
        <p class="auth-subtitle">Join Citadel National Bank today</p>

        <form method="POST" action="{{ url_for('register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control"
                       placeholder="As per official records" required>
            </div>

            <div class="form-group">
                <label for="username">Choose Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Minimum 3 characters" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="your.email@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Min 8 chars, uppercase, lowercase, digit, special" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="Re-enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in here</a>
        </div>
    </div>
</div>
{% endblock %}
