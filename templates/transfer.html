{% extends "base.html" %}
{% block title %}Transfer Funds — Citadel National Bank{% endblock %}

{% block content %}
<div class="page-container">
    <h1 class="page-title">💸 Transfer Funds</h1>

    <div class="stats-row">
        <div class="stat-card balance">
            <div class="stat-value">₹{{ "{:,.2f}".format(user.balance) }}</div>
            <div class="stat-label">Available Balance</div>
        </div>
        <div class="stat-card accent">
            <div class="stat-value">{{ user.account_number }}</div>
            <div class="stat-label">Your Account</div>
        </div>
    </div>

    <div class="card" style="max-width: 520px;">
        <div class="card-header">Send Money</div>

        <form method="POST" action="{{ url_for('transfer') }}" id="transferForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="to_account">Recipient Account Number</label>
                <input type="text" id="to_account" name="to_account" class="form-control"
                       placeholder="e.g. CNB1234567890" required>
            </div>

            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" name="amount" class="form-control"
                       placeholder="0.00" min="1" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="description">Description (optional)</label>
                <input type="text" id="description" name="description" class="form-control"
                       placeholder="e.g. Rent payment" maxlength="100">
            </div>

            <button type="submit" class="btn btn-success btn-block">Proceed to Verify →</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Back button prevention during transfer — shows confirmation dialog
    var formSubmitted = false;
    document.getElementById('transferForm').addEventListener('submit', function() {
        formSubmitted = true;
    });
    window.addEventListener('beforeunload', function(e) {
        var amount = document.getElementById('amount').value;
        var account = document.getElementById('to_account').value;
        if ((amount || account) && !formSubmitted) {
            e.preventDefault();
            e.returnValue = 'You have an incomplete transfer. Data will not be saved if you leave. Are you sure?';
            return e.returnValue;
        }
    });
</script>
{% endblock %}
